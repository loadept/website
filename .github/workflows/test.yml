name: Test Project

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - LICENSE
      - AGENTS.md
      - docs/**
      - .gitignore
      - .dockerignore

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Get gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
      - name: Get gotestsum
        run: |
          go install gotest.tools/gotestsum@latest

      - name: Check format
        run: |
          files=$(gofumpt -l .)
          if [ -n "$file" ]; then
            gofumpt -d $files
          else
            echo "everything is in order!"
          fi

      - name: Run tests
        run: |
          gotestsum \
            --junitfile results.xml \
            --format testdox \
            ./internal/...

      - name: Publish test result
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v1
        with:
          name: Go Tests
          path: results.xml
          reporter: java-junit
