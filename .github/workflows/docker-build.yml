name: Build and Push Docker Image

on:
  workflow_run:
    workflows:
      - Test Project
    types:
      - completed

jobs:
  deploy-on-server:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build \
          -t ghcr.io/loadept/website:latest \
          -t ghcr.io/loadept/website:${{ github.sha }} \
          .

          docker push ghcr.io/loadept/website:latest
          docker push ghcr.io/loadept/website:${{ github.sha }}
